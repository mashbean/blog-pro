<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="760" viewBox="0 0 1200 760" role="img" aria-labelledby="title desc">
  <title id="title">全台 OpenBook 四層架構</title>
  <desc id="desc">由官方證據層、來源登錄與城市轉接層、共同預算模型、居民與 AI 使用介面組成，所有輸出均可回到官方來源。</desc>
  <rect width="1200" height="760" fill="#f7f4ec"/>
  <text x="600" y="64" text-anchor="middle" font-family="Noto Sans TC, sans-serif" font-size="34" font-weight="700" fill="#172554">全台 OpenBook 的四層架構</text>
  <text x="600" y="98" text-anchor="middle" font-family="Noto Sans TC, sans-serif" font-size="18" fill="#475569">AI 可以協助搜尋與解釋，官方原始資料仍是最終證據</text>

  <g font-family="Noto Sans TC, sans-serif">
    <rect x="120" y="140" width="960" height="110" rx="18" fill="#dbeafe" stroke="#2563eb" stroke-width="2"/>
    <text x="155" y="182" font-size="24" font-weight="700" fill="#1e3a8a">4　居民與 AI 使用介面</text>
    <text x="155" y="218" font-size="18" fill="#1e40af">縣市比較、年度趨勢、CSV、文件回鏈、自然語言查詢、MCP 或 REST gateway</text>

    <path d="M600 250 L600 282" stroke="#64748b" stroke-width="3" marker-end="url(#arrow)"/>
    <rect x="120" y="284" width="960" height="110" rx="18" fill="#dcfce7" stroke="#16a34a" stroke-width="2"/>
    <text x="155" y="326" font-size="24" font-weight="700" fill="#14532d">3　共同預算模型</text>
    <text x="155" y="362" font-size="18" fill="#166534">年度、政府、機關、功能、計畫、科目、預算階段、金額、來源與版本</text>

    <path d="M600 394 L600 426" stroke="#64748b" stroke-width="3" marker-end="url(#arrow)"/>
    <rect x="120" y="428" width="960" height="110" rx="18" fill="#fef3c7" stroke="#d97706" stroke-width="2"/>
    <text x="155" y="470" font-size="24" font-weight="700" fill="#78350f">2　來源登錄與城市轉接器</text>
    <text x="155" y="506" font-size="18" fill="#92400e">22 縣市來源清冊、欄位對照、健康檢查、內容雜湊、版本差異與人工驗證</text>

    <path d="M600 538 L600 570" stroke="#64748b" stroke-width="3" marker-end="url(#arrow)"/>
    <rect x="120" y="572" width="960" height="110" rx="18" fill="#fee2e2" stroke="#dc2626" stroke-width="2"/>
    <text x="155" y="614" font-size="24" font-weight="700" fill="#7f1d1d">1　官方證據層</text>
    <text x="155" y="650" font-size="18" fill="#991b1b">主計總處共同彙編、地方預算與決算原檔、政府資料目錄、正式預算書與表註</text>
  </g>

  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="5" refY="5" orient="auto-start-reverse">
      <path d="M0 0 L10 5 L0 10 z" fill="#64748b"/>
    </marker>
  </defs>
</svg>
