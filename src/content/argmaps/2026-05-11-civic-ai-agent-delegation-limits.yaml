slug: 2026-05-11-civic-ai-agent-delegation-limits
title: AI 代理可以代我連署、投票、出席聽證嗎：公民行動委任的制度極限
subtitle: Civic AI Agent Delegation Limits — Argument Map (v2)

# ─────────────────────────────────────────────────────────────
# Central Thesis + Formal block
# ─────────────────────────────────────────────────────────────
coreThesis:
  text: |
    AI 代理在公民行動中的角色須分三層處理。L1 完全允許（資訊查詢、文件預填、簡單登入）、L2 條件允許（申訴提交、行政程序協助，須四件式委任機制 scope / revocation / audit / override）、L3 絕對禁止（投票、政治連署、聽證發言、宣誓證詞、政治參選、選民登記、公投連署、罷免連署）。判準是「微觀真實性」（micro-authenticity），由 Arendt plurality + Arendt natality + Habermas Verständigungsorientierung 三項條件構成。失能者保留 supported decision-making 對齊的雙重認證例外。責任歸屬採三層分配。
  summary: AI agents in civic action divide into three tiers (L1 full permission, L2 conditional permission, L3 absolute prohibition) by the micro-authenticity criterion (plurality + natality + Verständigungsorientierung); disabled users retain a supported-decision-making aligned double certification exception, with three-tier liability allocation.
  formal:
    expression: |
      Tier(a) ∈ {L1, L2, L3}   classified by   M_auth(a) ≜ Plur(a) ∧ Nat(a) ∧ Verst(a)

      L1 ⇔ ¬M_auth(a)   ;   L3 ⇔ M_auth(a) ∧ essential_expression(a)
      L2 ⇔ partial M_auth(a)  ∧  D(a) = ⟨Scope, Revoc, Audit, Override⟩

      Liability = ⟨T1_strict + insurance, T2_negligence + reverse_burden, T3_narrow⟩
      Disability_exception ⇔ DA_certification ∧ tech_audit  (CRPD Art 12 aligned)
    caption: 行動 a 的層級由微觀真實性 M_auth 判斷。L1 場景下 M_auth 不成立，AI 代理完全允許；L3 場景下 M_auth 成立且為公民意志的本質性表達，AI 代理絕對禁止；L2 為中間區域，須四件式委任機制 D 同時成立。責任分三層（Tier 1 嚴格 + 強制保險、Tier 2 過失 + 舉證倒置、Tier 3 限縮）。失能者例外須通過 disability advocacy 主導的能力對應 + 獨立技術 audit 雙重認證，與 CRPD Art 12 對齊。
    legend:
      - symbol: M_auth(a)
        meaning: Micro-authenticity of action a — 行動 a 的微觀真實性
      - symbol: Plur(a)
        meaning: Arendt plurality — 行動者人格獨特性
      - symbol: Nat(a)
        meaning: Arendt natality — 行動的新開始性
      - symbol: Verst(a)
        meaning: Habermas Verständigungsorientierung — 相互理解導向
      - symbol: D(a)
        meaning: 委任機制四件式 ⟨Scope, Revocation, Audit, Override⟩
      - symbol: T1/T2/T3
        meaning: 責任分配三層（模型/廠商 / 開發者/整合商 / 委任者/使用者）
      - symbol: DA_certification
        meaning: Disability advocacy 主導的能力對應認證
      - symbol: ≜
        meaning: 「定義為」
      - symbol: ⇔
        meaning: 當且僅當
      - symbol: ∧
        meaning: 合取（同時成立）

# ─────────────────────────────────────────────────────────────
# Transitions (區塊之間的接連描述)
# ─────────────────────────────────────────────────────────────
transitions:
  beforeDistinction: |
    公式給出立場，下一步要把常見誤讀拉開。AI 代理在公民行動的論述常被預設為「全有或全無」（completely permitted vs completely prohibited）；這個二元化遮蔽了 L1 / L2 / L3 的三層結構，並使「微觀真實性」判準失去著力點。地圖第一動作是把「全有或全無」與「三層分類 + 微觀真實性判準」這兩個分類拉開。

  beforePillars: |
    區分本身只是宣告。要證明三層分類 + 微觀真實性判準成立，需要五條獨立來源的支撐。演繹面從 Arendt + Habermas 建立微觀真實性概念；類比面從 5 法域選舉法比較加上演算法規模化風險；溯因面從判準推導 L1/L2/L3；反例面用失能者依賴 AI 輔助挑戰 L3 絕對禁止並設計雙重認證例外；實作面合成委任機制四件式與責任分配三層。五條 pillar 對應五個論證類型，缺一立場退化為呼籲。

  beforeChain: |
    pillars 是正向論證。但 L3 絕對禁止會遇到具體挑戰；當 AI 代理批量執行公投連署，會發生什麼？台灣 2026 公投連署假想案例提供一條從「AI 預填 → 數位簽章 → 部分偽造 → 中央選舉委員會宣告無效」的具體因果鏈。前段是規範必然（規模化偽冒違反《公民投票法》親自簽名要件），後段是概率事件（事後查獲偽造的比例與訴訟結果）。把鏈條展開的目的是把抽象的三層義務違反翻譯成可被機制性追溯的事件序列。

  beforeBorders: |
    立場 + 因果鏈成立後，反論才真的具威脅。Floridi augmentation 主張 AI 是擴展不是取代；Estlund 程序合理性主張形式合規即正當；cyber-libertarian 立場主張市場主導應優先。仔細檢驗每條反論的實證強度，會發現它們不僅未推翻地圖立場，反而 flip to support 三層分類；亦即反論自己的證據結構，正好是地圖的第二層支撐。

  beforeConditions: |
    反論被吸收後，留下的是設計含意。在什麼條件下，「AI 代理委任機制」可以被視為合法的政策路徑？六道條件把抽象的三層分類翻譯成可被檢驗的工程或法律義務，同時填入核心公式的 D(a) 與 Liability。

  beforeConclusion: |
    把規範、政治哲學、選舉法、三層分類、失能者例外、責任分配、案例六層收束起來，地圖最終要說的是政治經濟層的成就（微觀真實性不能只透過工程實現，須立法承認）以及一條跨越所有層級的不對稱原則；公民可以在 L1 / L2 場景下用 AI 代理增強行動，但 L3 場景下無論技術多成熟，AI 代理都不能取代人類執行行動。

# ─────────────────────────────────────────────────────────────
# Foundational Distinction
# ─────────────────────────────────────────────────────────────
distinction:
  rejected:
    label: ❌ 被拒絕
    title: AI 代理在公民行動中採「全有或全無」分類
    body: |
      把 AI 代理在公民行動中的角色化約為兩個選項。第一是「全有」（completely permitted）；AI 代理可執行所有公民行動，包括投票、聽證、連署；只要委任合約有效即可。第二是「全無」（completely prohibited）；AI 代理在所有公民行動中都被禁止，無論行動性質。這個二元化遮蔽了不同公民行動的微觀真實性差異，並使「資訊查詢、文件預填、申訴提交」這類工具性行動被誤判為與「投票、聽證發言、政治連署」這類本質性表達同等處置。Floridi cyber-libertarian 與部分行政便利主義者最終都會被收束到此分類。
    formal: "Tier(a) ∈ {permitted, prohibited}   （把 AI 代理當作二元決策）"
  accepted:
    label: ✓ 被辯護
    title: 三層分類 + 微觀真實性判準
    body: |
      AI 代理在公民行動中的角色須分三層處理。L1 完全允許（資訊查詢、文件預填、簡單登入、便利接入）；L2 條件允許（申訴提交、行政程序協助，須四件式委任機制）；L3 絕對禁止（投票、政治連署、聽證發言、宣誓證詞、政治參選、選民登記、公投連署、罷免連署）。三層分類的判準是「微觀真實性」（micro-authenticity），由 Arendt plurality + Arendt natality + Habermas Verständigungsorientierung 三項條件構成。失能者保留 supported decision-making 對齊的雙重認證例外。
    formal: "Tier(a) ∈ {L1, L2, L3}   ;   classified by   M_auth(a) ≜ Plur(a) ∧ Nat(a) ∧ Verst(a)"

# ─────────────────────────────────────────────────────────────
# Five Supporting Pillars
# ─────────────────────────────────────────────────────────────
pillars:
  - section: §3 — 演繹（Arendt + Habermas）
    title: 微觀真實性是民主正當性的必要件
    role: 提供政治哲學基礎；若無「微觀真實性」判準，三層分類退化為任意劃分，缺乏規範力道。借自 Arendt + Habermas 的整合架構，把判準收斂為三項可被檢驗的條件。
    body: |
      Arendt 1958 *The Human Condition* §24-28 把 action 與 labor / work 區分。Action 的本體論前提是 plurality（人類在 action 中既相同又獨特）+ natality（每次行動是新的開始）。Habermas 1981 *Theorie des kommunikativen Handelns* Vol I §III 把 communicative action 與 strategic action 區分，前者的核心是 Verständigungsorientierung（相互理解導向）。把 Arendt action / labor / work 三層對應到當代電子化公民行動，labor / work 對應 L1，action 對應 L3，L2 為中間區域。「微觀真實性」三項條件構成 L3 絕對禁止的規範依據。Pettit 1997 共和主義 *libertas* 傳統 + Gutmann-Thompson 1996 reciprocity 原則 + Young 2000 inclusion 論證提供互補支撐。
    finding: AI 代理在 L3 場景下破壞微觀真實性的三項條件——plurality（多使用者共享同一模型決策）、natality（行動為訓練模式執行）、Verständigungsorientierung（AI 的成果導向取代使用者的相互理解導向）。Augmentation 在 L3 等同於 replacement。
    formal: "M_auth(a) ≜ Plur(a) ∧ Nat(a) ∧ Verst(a)   ;   AI_agent(a) ⇒ ¬Plur(a) ∧ ¬Nat(a) ∧ ¬Verst(a)"

  - section: §4 — 類比（親自要件強度光譜 + 演算法規模化風險）
    title: 即使在允許 proxy voting 的法域，AI 代理執行 L3 仍應被禁止
    role: 提供比較法基礎；單一論據（如「美國禁止他人代投」）無法支撐 L3 絕對禁止的跨法域必要性。雙軸論證保留各國親自要件差異，同時引入演算法規模化風險作為獨立論據。
    body: |
      第一軸「親自要件強度光譜」涵蓋 5 法域。強強度為德國 Bundeswahlgesetz §14（限親自）+ 聯邦憲法法院 2 BvC 4/13（2014）、台灣《公職人員選舉罷免法》第 18 條 + 釋字第 468 號（公職人員候選人連署制度，含連署親自簽名要件）、日本《公職選挙法》第 44 條（投票所での投票）。中強度為美國 Voting Rights Act 1965 Section 208 + *Crawford v. Marion County Election Board* (2008)。較弱為英國 *Representation of the People Act 1985*（海外公民、軍人配偶 proxy voting）。第二軸「演算法規模化風險」由 Birch 2011 *Electoral Malpractice* + Norris 2014 *Why Electoral Integrity Matters* 支撐——AI 代理因可被同步部署於 N 個使用者，規模化偽冒風險顯著高於傳統 proxy voting。
    finding: 兩軸的交集（弱親自要件 + 高規模化風險）需要特別保護。即使在允許 proxy voting 的法域，AI 代理執行 L3 行動仍應被禁止；因為 AI 代理打破了傳統 proxy voting 的自然限制（時間 / 地理 / 委任關係），使「規模化偽冒」變為可能。
    formal: "∀ jurisdiction j : (weak_personal(j) ∧ AI_scale_risk(a)) ⇒ prohibit(AI_agent, L3, j)"

  - section: §5 — 溯因（L1/L2/L3 三層分類 + 灰色情境邊界）
    title: 判準推導三層分類加上 7 個灰色情境邊界判定
    role: 提供分類操作；若三層分類沒有具體 use case 與灰色情境判定機制，writer 與政策制定者無法把判準應用於實務。本 pillar 提供分類的可操作化。
    body: |
      L1 use case 含資訊查詢、文件預填、簡單登入、便利接入、行政流程通知。L2 use case 含申訴提交、行政程序協助、法律文件起草；「條件」具體化為四項（人類即時覆寫權 + 完整稽核紀錄 + 範圍限定 + 即時撤銷）。L3 use case 含投票、政治連署、聽證發言、宣誓證詞、政治參選、選民登記、公投連署、罷免連署。7 個灰色情境的邊界判定為：線上連署 = L3（連署簽名是公民意志表達）、公投連署 = L3（涉及法律後果）、政府滿意度調查 = L2（諮詢性質）、地方議會直播留言 = L2（非正式意見）、AI 諮詢服務 = L1（純資訊）、行政聽證旁聽 = L1（被動接收）、行政聽證發言 = L3（意志表達）。三層分類為「分析性類型學」，跨法域承載為普通法系 procedural / substantive / institutional due process、大陸法系 formelle / materielle Rechtsstaatlichkeit / Schutzpflicht、東亞憲政「制度的保障」傳統。
    finding: 三層分類可操作化為具體 use case + 灰色情境邊界判定機制；L2 中間狀態的穩定性由四項條件設計保證。
    formal: "L1 = ⟨queries, prefills, logins⟩  ;  L2 = ⟨appeals, admin_assist⟩ ∧ D = ⟨Scope, Revoc, Audit, Override⟩  ;  L3 = ⟨vote, sign, testify, register⟩"

  - section: §6 — 反例（失能者依賴 + 雙重認證）
    title: Supported decision-making 對齊的雙重認證例外
    role: 提供邊界條件處理；若 L3 絕對禁止無例外，會對失能者構成歧視（CRPD Art 29 政治參與權違反）；若例外設計不當，會違反 CRPD Art 12 自主權。雙重認證設計同時滿足兩者。
    body: |
      失能者（嚴重肢體障礙、視障、漸凍症患者、自閉譜系障礙者、學習障礙者）已長期依賴他人或輔具進行公民行動。CRPD Art 29 政治參與權 + Art 12 法律之前的平等承認 + Art 9 accessibility 三向法理要求設計例外。但 CRPD Art 12 + General Comment No. 1（2014）明確要求廢除替代決策（substituted decision-making, must replace），代之以支援決策（supported decision-making）。intake 原版「受認證的醫療資格判定」措辭與此原則直接衝突。本文修訂為「supported decision-making 對齊的雙重認證」：認證 1（由 disability advocacy 組織主導的能力對應，依 UN A/HRC/34/58 (2017) 對 supported decision-making 的論證）+ 認證 2（獨立技術 audit 確認 transparency / explainability / non-manipulation）。
    finding: 雙重認證設計同時回應 paternalism 反論（disability advocacy 主導而非醫療機構）+ 分類滑坡反論（雙重認證設立明確門檻）；ECtHR *Alajos Kiss v. Hungary* (2010) + *Stanev v. Bulgaria* (2012) 確立失能者法律行為能力的個別評估原則，為雙重認證提供法律先例支撐。
    formal: "Disability_exception(a, L3) ⇔ DA_certification(a) ∧ tech_audit(a)   ;   CRPD Art 12 compliant"

  - section: §7 — 實作（委任機制四件式 + 責任分配三層）
    title: 四件式 + 三層責任 + 三項 caveat
    role: 提供政策合成；若三層分類只停留在抽象層級，無法被立法或行政命令落實，整個論證退化為呼籲。本 pillar 把抽象義務翻譯為具體條款，含時程、政治阻力、量化指標。
    body: |
      委任機制四件式（D(a) = ⟨Scope, Revocation, Audit, Override⟩）的標準起點為 OpenID GAS draft 2024-2025 §5（scope claim）、W3C DID Core 1.0 §5.2.6（verification methods + key revocation）、EU AI Act Art 12（automated logging）+ Art 14（human oversight）、ISO/IEC 42001 + NIST AI RMF 1.0。責任分配三層為 Tier 1（模型提供者 / wallet 廠商）嚴格責任 + 強制保險；Tier 2（開發者 / 整合商）過失責任 + 舉證倒置；Tier 3（委任者 / 使用者）限縮責任，僅在「明知 AI 越界仍委任」時承擔。法理依據含 EU AI Liability Directive 2022 提案（COM(2022) 496，已於 2025-02 撤回）+ Directive (EU) 2024/2853（修訂後 Product Liability Directive）+ 台灣《消費者保護法》+ 日本《製造物責任法》+ Crootof 2019 + Selbst 2020。
    finding: 三層責任分配的「結構」是規範必然（依風險預防能力分配），具體比例（如 Tier 1 60% / Tier 2 30% / Tier 3 10%）為政策建議數，須立法協商；caveat 含責任比例待實證、保險成本傳導風險、中小開發者退出壓力（透過 article 14 廠商三層分類的 Tier 3 免責設計處理）。
    formal: "D(a) = ⟨Scope, Revoc, Audit, Override⟩   ;   Liability = ⟨T1_strict + insurance, T2_negligence + reverse_burden, T3_narrow⟩"

# ─────────────────────────────────────────────────────────────
# Causal Chain (AI公投連署偽造案例 process trace)
# ─────────────────────────────────────────────────────────────
chain:
  title: 假想 AI 公投連署偽造五步因果鏈（規模化偽冒 → 中選會宣告無效）
  steps:
    - tag: T0
      kind: deterministic
      text: 一個 AI 代理被部署為公投連署的「批量代理」工具，未通過 disability advocacy 認證（規範必然）
    - tag: T1
      kind: deterministic
      text: AI 代理為 5000 個使用者完成連署，但其中 200 件涉及偽造（AI 自編個資 + 違反 scope 限制）；scope 設定不完整與 audit 紀錄不完整是規範必然
    - tag: T2
      kind: deterministic
      text: 中央選舉委員會在連署資料驗證階段識別偽造（《公民投票法》第 7-11 條親自簽名要件 + 戶政資料對照）
    - tag: T3
      kind: probabilistic
      text: 中選會宣告該 200 件連署無效；整體連署有效性的審查程序啟動（外部 trigger，依個案而異）
    - tag: T4
      kind: probabilistic
      text: Tier 1（模型提供者 / wallet 廠商）依《消費者保護法》+《電子簽章法》承擔嚴格責任 + 強制保險賠付受害公民
    - tag: T5
      kind: probabilistic
      text: Tier 2（開發者 / 整合商）依過失責任 + 舉證倒置承擔；Tier 3（委任者）若明知 AI 越界仍委任則承擔限縮責任
  legend:
    - kind: deterministic
      label: 機制必然（結構性，不依賴外部 trigger）
    - kind: probabilistic
      label: 概率性（需要外部 trigger 才實現，但概率不可忽略）

# ─────────────────────────────────────────────────────────────
# Border Cases — flip to support
# ─────────────────────────────────────────────────────────────
borders:
  - label: 反論 1
    title: Floridi — AI 是 augmentation 而非 replacement
    pivot: 反論訴求是 Floridi 2023 *The Ethics of Artificial Intelligence* 主張 AI 為擴展工具，「人格性表達」可由 human-AI 混合主體承擔。實證強度上，augmentation 概念在 L1 / L2 場景下實際成立（使用者意志透過 AI 代理被擴展但不被取代），且部分 AI 倫理學者（如 Coeckelbergh 2020 relational approach）支持類似立場。
    flip: |
      仔細看，L3 場景下「微觀真實性」三項條件不可被 augmented。當 AI 代理批量執行投票，plurality 已被破壞（多個使用者共享同一模型決策）、natality 已被破壞（行動為訓練模式執行）、Verständigungsorientierung 已被破壞（AI 的 Erfolgsorientierung 取代）。Augmentation 在 L3 等同於 replacement。Floridi 的論證實際上凸顯了 L1 / L2 與 L3 的本體論差異——augmentation 概念本身就要求區分擴展空間（L1 / L2）與本質性表達（L3），這正是地圖的核心論證。

  - label: 反論 2
    title: Estlund — 民主正當性的核心是程序合理性
    pivot: 反論訴求是 Estlund 2008 *Democratic Authority* Ch 6-8 主張民主正當性的核心是「程序合理性」（procedural rationality）而非「人格性表達」。AI 代理只要遵守程序就有正當性。實證強度上，程序合理性在當代 deliberative democracy 學派有廣泛支持。
    flip: |
      程序合理性是民主正當性的必要條件，但並非充分條件。當 AI 代理批量執行 L3 行動時，程序「形式」可能合規（如 NIST AI RMF 1.0 + EU AI Act Art 14 human oversight），但「微觀真實性」已被破壞。Estlund 的論證實際上凸顯了程序合理性的盲點——它能處理「決策過程的合法性」但不能處理「行動主體的真實性」。這正是地圖的微觀真實性判準所填補的空缺。Estlund 反論反向支撐「程序合理性 + 微觀真實性」雙層必要件的論證。

  - label: 反論 3
    title: cyber-libertarian — 市場主導 vs 國家退出
    pivot: 反論訴求是 Lessig 1999 *Code* 與 cyber-libertarian 立場主張政治哲學概念在數位時代應重新定義；用 1958 / 1981 年的概念套 2026 年的 AI agent 是 anachronism。市場主導 + 自願性合約應優先於強制連帶責任。實證強度上，去中心化 wallet 社群（Polygon ID、ENS、Worldcoin）有結構性支持。
    flip: |
      「微觀真實性」三項條件本身（plurality / natality / Verständigungsorientierung）並未依賴於前數位時代的物質條件；它們是民主正當性的微觀基礎，與技術時代無關。Lessig 的批評只能反駁「概念字面套用」，不能反駁「概念實質延伸」。同時，市場主導無法滿足 inclusion 條件——當 AI 代理批量執行 L3 行動時，「不會用 AI 的公民」（如年長者、低數位識讀者）被排除於民主行動之外，違反 article 15 已論證的 civic proof inclusion rights。cyber-libertarian 反論反向支撐「分層責任設計 + Tier 3 中介廠商免責」的政策路徑（仿 article 14 三層分類），避免市場集中於少數大廠商。

# ─────────────────────────────────────────────────────────────
# Procedural Conditions (six firewalls of AI agent delegation)
# ─────────────────────────────────────────────────────────────
conditions:
  title: 任何 AI 代理在公民行動的委任機制，必須先通過六道條件
  formalPrelude: "valid_delegation(a) ⇔ V_tier ∧ V_scope ∧ V_revoc ∧ V_audit ∧ V_override ∧ V_liability"
  items:
    - title: 三層分類判定
      body: |
        每個公民行動須先依微觀真實性判準分類為 L1 / L2 / L3。判定須含 7 個灰色情境的邊界判定機制（線上連署 = L3、公投連署 = L3、政府滿意度調查 = L2、地方議會直播留言 = L2、AI 諮詢服務 = L1、行政聽證旁聽 = L1、行政聽證發言 = L3）。L3 行動無條件禁止 AI 代理。
      formal: "V_tier: ∀ action a : Tier(a) ∈ {L1, L2, L3}; L3 ⇒ prohibit(AI_agent, a)"
    - title: Scope 範圍限定
      body: |
        L2 委任須對應具體 use case（如「為 X 服務的 Y 流程」），禁止 wildcard 委任。標準起點為 OpenID GAS draft 2024 §5（scope claim）。
      formal: "V_scope: ∀ delegation d ∈ L2 : ∃ specific_scope(d) ∧ ¬wildcard(d)"
    - title: Revocation 即時撤銷
      body: |
        使用者可隨時撤銷委任，無延遲。撤銷後 AI 代理立即停止所有相關行動。標準起點為 W3C DID Core 1.0 §5.2.6（verification methods + key revocation）+ EU EUDI Wallet ARF 2024 revocation registry。
      formal: "V_revoc: ∀ d : revoke(d, t) ⇒ ∀ action a at t' > t : ¬execute(AI_agent, a)"
    - title: Audit 完整稽核
      body: |
        每個行動須有時間戳 + 行動內容 + 覆寫紀錄 + 模型版本 + 訓練資料來源。標準起點為 NIST AI RMF 1.0 + ISO/IEC 42001 + EU AI Act Art 12（automated logging）。
      formal: "V_audit: ∀ action a : record(timestamp, content, override_log, model_version, training_source)(a)"
    - title: Override 人類覆寫
      body: |
        使用者隨時可覆寫 AI 代理的決策，無時間延遲，覆寫不需理由。標準起點為 EU AI Act Art 14（human oversight）+ Microsoft Responsible AI Standard 2023。
      formal: "V_override: ∀ AI_decision d : ∃ override(user, d) ∧ time(override) → 0"
    - title: 責任分配三層
      body: |
        Tier 1（模型提供者 / wallet 廠商）嚴格責任 + 強制保險；Tier 2（開發者 / 整合商）過失責任 + 舉證倒置；Tier 3（委任者 / 使用者）限縮責任，僅在「明知 AI 越界仍委任」時承擔。法理依據含 Directive (EU) 2024/2853（修訂後 Product Liability Directive）+ 台灣《消費者保護法》+ 日本《製造物責任法》+ Crootof 2019 + Selbst 2020。
      formal: "V_liability: Liability = ⟨T1_strict + insurance, T2_negligence + reverse_burden, T3_narrow⟩"

# ─────────────────────────────────────────────────────────────
# Conclusion + Formal Coda
# ─────────────────────────────────────────────────────────────
conclusion:
  paragraphs:
    - <strong>AI 代理在公民行動中的角色不能被籠統地全有或全無處理。</strong>L3 絕對禁止 + L2 條件允許 + L1 完全允許三層分類，以「微觀真實性」（micro-authenticity）判準為核心。微觀真實性由 Arendt plurality + Arendt natality + Habermas Verständigungsorientierung 三項條件構成，是民主正當性的微觀基礎，與技術時代無關。
    - 短期實施應從 L1 完全允許開始（資訊查詢、文件預填、簡單登入屬工具性場景，AI 代理可立即部署），中期推進 L2 條件允許（須四件式委任機制 scope + revocation + audit + override 同步成熟），長期維持 L3 絕對禁止（投票、政治連署、聽證發言、宣誓證詞、政治參選、選民登記、公投連署、罷免連署不可被 AI 代理取代）。<em>失能者保留 supported decision-making 對齊的雙重認證例外</em>，由 disability advocacy 主導的能力對應 + 獨立技術 audit 共同構成。
    - <strong>對台灣讀者的關鍵警示為現行法律框架對 AI 代理在公民行動中的角色尚無明文規範。</strong>《公職人員選舉罷免法》第 18 條與《公民投票法》第 7-11 條雖然要求親自，但對 AI 代理的具體界定仍待立法。中央選舉委員會、數位發展部、衛福部三方應協調建立明確的 AI 代理委任規範，特別是對失能者的雙重認證機制。這條跨層級不對稱原則是 article 16 對博論 Ch 9（civic AI delegation + receipts）的最直接引信，並補完既有 article 2026-04-01-agentic-id-governance 的 civic 補集。
  formalCoda: |
    Final form:
      M_auth(a) ≜ Plur(a) ∧ Nat(a) ∧ Verst(a)
      Tier(a) ∈ {L1, L2, L3}   classified by M_auth(a)
      L1 ⇔ ¬M_auth(a)   ;   L3 ⇔ M_auth(a) ∧ essential_expression(a)
      L2 ⇔ partial M_auth(a) ∧ D(a) = ⟨Scope, Revoc, Audit, Override⟩
      Liability = ⟨T1_strict + insurance, T2_negligence + reverse_burden, T3_narrow⟩
      Disability_exception ⇔ DA_certification ∧ tech_audit  (CRPD Art 12 aligned)
